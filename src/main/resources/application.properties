# Pengaturan Koneksi MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/skyfly_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pengaturan Hibernate (JPA) untuk PBO
# update: akan otomatis membuatkan tabel di MySQL berdasarkan kelas Java kita!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mengatur Port agar tidak bentrok dengan React
server.port=5000